<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Lock things down: no REMOTE content (no http/https), but allow our own local
       files. We must include the file: scheme because Chromium treats a file://
       page as having an opaque origin, so 'self' alone matches nothing and would
       block our own stylesheet and scripts. data:/blob: support icons + export. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self' file:; style-src 'self' file: 'unsafe-inline'; img-src 'self' file: data:; font-src 'self' file:; connect-src 'self' file:;">
  <title>Protocol</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app">

  <!-- Custom (frameless) title bar. Draggable; holds the active area's controls on
       the left and the window buttons on the right. Replaces the native OS bar. -->
  <div class="titlebar">
    <div class="tb-context">
      <div class="tbc" data-tbc="calendar">
        <div class="nav">
          <button id="nav-prev" title="Previous">‹</button>
          <button id="nav-today">Today</button>
          <button id="nav-next" title="Next">›</button>
        </div>
        <span id="cal-title" class="cal-title"></span>
      </div>
      <div class="tbc" data-tbc="goals">
        <button id="btn-add-goal" class="primary">+ Add goal</button>
        <button class="tb-search-btn" data-search-btn title="Search goals (Ctrl+F)">
          <svg class="search-ic" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
            <circle cx="6.7" cy="6.7" r="4.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <line x1="9.9" y1="9.9" x2="14" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
        </button>
      </div>
      <div class="tbc" data-tbc="notes">
        <button id="btn-new-note" class="primary">+ Note</button>
        <button class="tb-search-btn" data-search-btn title="Search notes (Ctrl+F)">
          <svg class="search-ic" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
            <circle cx="6.7" cy="6.7" r="4.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <line x1="9.9" y1="9.9" x2="14" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
        </button>
      </div>
    </div>

    <div class="tb-drag"></div>

    <div class="tb-controls">
      <button class="tb-btn" data-win="min" title="Minimize" aria-label="Minimize">&#xE921;</button>
      <button class="tb-btn" data-win="max" title="Maximize" aria-label="Maximize">&#xE922;</button>
      <button class="tb-btn tb-close" data-win="close" title="Close" aria-label="Close">&#xE8BB;</button>
    </div>
  </div>

  <div class="workspace">
    <!-- The one sidebar -->
    <nav class="sidebar">
      <div class="side-nav">
        <button class="side-item" data-view-area="calendar">Calendar</button>
        <button class="side-item" data-view-area="goals">Goals</button>
        <button class="side-item" data-view-area="notes">Notes</button>
      </div>
    </nav>

    <!-- The single main view. Exactly one .area is visible at a time. -->
    <main class="main">
      <div id="error-banner" class="error-banner" hidden></div>

      <section class="area area-calendar" data-area="calendar">
        <div class="cal-split">
          <aside class="backlog-panel">
            <div class="panel-head">
              <h2>Backlog <span id="backlog-count" class="count"></span></h2>
              <button class="rail-toggle" id="btn-toggle-backlog" title="Collapse">‹</button>
            </div>
            <p class="backlog-hint">Unscheduled tasks. Drag one onto a day to schedule it, or click to edit. New tasks without a date appear here.</p>
            <div id="backlog-list" class="backlog-list"></div>
          </aside>
          <div id="calendar-body" class="calendar-body"></div>
        </div>
      </section>

      <section class="area area-goals" data-area="goals">
        <div id="goal-tree" class="goal-tree"></div>
      </section>

      <section class="area area-notes" data-area="notes">
        <div class="notes-split">
          <aside class="notes-side">
            <div class="notes-side-head">
              <button class="rail-toggle" id="btn-toggle-noteslist" title="Collapse">‹</button>
            </div>
            <div id="notes-list" class="notes-list"></div>
          </aside>
          <div class="notes-editor">
            <input id="note-title" type="text" class="note-title" placeholder="Title">
            <textarea id="note-body" class="note-body"></textarea>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- New goal: name it first, then it's created -->
  <dialog id="goal-dialog">
    <form id="goal-form">
      <h3>New goal</h3>
      <label class="field">Name
        <input id="goal-name" type="text" autocomplete="off">
      </label>
      <div class="field" id="tpl-field">
        <span>Start from a template</span>
        <div id="tpl-picker" class="tpl-picker"></div>
      </div>
      <menu class="dialog-actions">
        <button type="button" id="goal-cancel" class="ghost">Cancel</button>
        <button type="submit" class="primary">Create</button>
      </menu>
    </form>
  </dialog>

  <!-- Leaf details editor -->
  <dialog id="leaf-dialog">
    <form id="leaf-form">
      <h3 id="leaf-dialog-title">Task details</h3>

      <label class="field">Title
        <input id="lf-title" type="text" autocomplete="off">
      </label>

      <label class="field switch-row">
        <span>Recurring</span>
        <span class="switch"><input type="checkbox" id="lf-recurring"><span class="slider"></span></span>
      </label>

      <label class="field">Duration (optional)
        <input id="lf-duration" type="text" autocomplete="off" placeholder="1h30m">
      </label>
      <div id="lf-duration-hint" class="hint"></div>

      <fieldset id="lf-task-fields" class="field">
        <legend>Schedule</legend>
        <div class="row">
          <label>Date (optional) <input id="lf-date" type="date"></label>
          <label>Time (optional) <input id="lf-time" type="time"></label>
        </div>
      </fieldset>

      <fieldset id="lf-budget-fields" class="field">
        <legend>Recurrence</legend>
        <div class="dow" id="lf-dow" aria-label="Days of week"></div>
        <div class="row">
          <label>Start time <input id="lf-rec-time" type="time"></label>
          <label>From (optional) <input id="lf-rec-start" type="date"></label>
          <label>Until (optional) <input id="lf-rec-end" type="date"></label>
        </div>
      </fieldset>

      <label class="field">Notes (optional)
        <textarea id="lf-notes" rows="2"></textarea>
      </label>

      <menu class="dialog-actions">
        <button type="button" id="lf-cancel" class="ghost">Cancel</button>
        <button type="submit" id="lf-save" class="primary">Save</button>
      </menu>
    </form>
  </dialog>

  <!-- Page-scoped search palette (top-bar Search button / Ctrl+F). Opened non-modally. -->
  <dialog id="search-dialog" class="search-dialog">
    <div class="search-box">
      <input id="search-input" type="text" placeholder="Search goals and notes…" autocomplete="off" spellcheck="false">
      <button type="button" id="search-close" class="ghost">Esc</button>
    </div>
    <div id="search-results" class="search-results"></div>
    <div class="search-foot">↑ ↓ to move · Enter to open · Esc to close</div>
  </dialog>

  <!-- Transient feedback (undo / redo) -->
  <div id="toast" class="toast" hidden></div>

  <!-- Load order: pure logic → store → actions → panels → bootstrap. -->
  <script src="js/util.js"></script>
  <script src="js/model.js"></script>
  <script src="js/store.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/journal.js"></script>
  <script src="js/picker.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/backlog.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
