<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Lock things down: no REMOTE content (no http/https), but allow our own local
       files. We must include the file: scheme because Chromium treats a file://
       page as having an opaque origin, so 'self' alone matches nothing and would
       block our own stylesheet and scripts. data:/blob: support icons + export. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self' file:; style-src 'self' file: 'unsafe-inline'; img-src 'self' file: data:; font-src 'self' file:; connect-src 'self' file:;">
  <title>Protocol</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app">

  <!-- Custom (frameless) title bar. Draggable; holds the active area's controls on
       the left and the window buttons on the right. Replaces the native OS bar. -->
  <div class="titlebar">
    <div class="tb-left">
      <div class="tbc" data-tbc="calendar">
        <button id="nav-back" class="tb-back" title="Back to month" aria-label="Back to month">‹</button>
        <div class="nav">
          <button id="nav-prev" title="Previous">‹</button>
          <button id="nav-today">Today</button>
          <button id="nav-next" title="Next">›</button>
        </div>
        <span id="cal-title" class="cal-title"></span>
      </div>
      <div class="tbc" data-tbc="notes">
        <span class="cal-title strong">Notes</span>
      </div>
    </div>

    <div class="tb-drag"></div>

    <div class="tb-right">
      <div class="tbc" data-tbc="calendar">
        <button class="tb-search-btn" data-search-btn title="Search tasks (Ctrl+F)">
          <svg class="search-ic" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
            <circle cx="6.7" cy="6.7" r="4.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <line x1="9.9" y1="9.9" x2="14" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
        </button>
      </div>
      <div class="tbc" data-tbc="notes">
        <button id="btn-new-note" class="tb-action">+ Note</button>
        <button class="tb-search-btn" data-search-btn title="Search notes (Ctrl+F)">
          <svg class="search-ic" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
            <circle cx="6.7" cy="6.7" r="4.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <line x1="9.9" y1="9.9" x2="14" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
        </button>
      </div>
    </div>

    <div class="tb-controls">
      <button class="tb-btn" data-win="min" title="Minimize" aria-label="Minimize">&#xE921;</button>
      <button class="tb-btn" data-win="max" title="Maximize" aria-label="Maximize">&#xE922;</button>
      <button class="tb-btn tb-close" data-win="close" title="Close" aria-label="Close">&#xE8BB;</button>
    </div>
  </div>

  <div class="workspace">
    <!-- The one sidebar -->
    <nav class="sidebar">
      <div class="side-nav">
        <button class="side-item" data-view-area="calendar">Calendar</button>
        <button class="side-item" data-view-area="notes">Notes</button>
      </div>
      <div class="side-foot">
        <div id="timer-pop" class="timer-pop" hidden>
          <div id="timer-display" class="timer-display">0:00</div>
          <div class="timer-actions">
            <button id="timer-go" class="primary">Start</button>
            <button id="timer-reset" class="ghost">Reset</button>
          </div>
        </div>
        <button id="btn-timer" class="timer-btn" title="Time an activity">Timer</button>
      </div>
    </nav>

    <!-- The single main view. Exactly one .area is visible at a time. -->
    <main class="main">
      <div id="error-banner" class="error-banner" hidden></div>

      <section class="area area-calendar" data-area="calendar">
        <div id="calendar-body" class="calendar-body"></div>
      </section>

      <section class="area area-notes" data-area="notes">
        <div class="notes-split">
          <aside class="notes-side">
            <div class="notes-side-head">
              <button class="rail-toggle" id="btn-toggle-noteslist" title="Collapse">‹</button>
            </div>
            <div id="notes-list" class="notes-list"></div>
          </aside>
          <div class="notes-editor">
            <input id="note-title" type="text" class="note-title" placeholder="Title">
            <textarea id="note-body" class="note-body"></textarea>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Task / habit / subtask editor -->
  <dialog id="item-dialog">
    <form id="item-form">
      <h3 id="item-dialog-title">Task</h3>

      <label class="field">Title
        <input id="it-title" type="text" autocomplete="off">
      </label>

      <label class="field">Time (optional)
        <input id="it-time" type="text" autocomplete="off" placeholder="e.g. 9:00 AM">
      </label>

      <label class="field switch-row" id="it-recurring-row">
        <span>Recurring (habit)</span>
        <span class="switch"><input type="checkbox" id="it-recurring"><span class="slider"></span></span>
      </label>

      <fieldset id="it-habit-fields" class="field">
        <legend>Repeats on</legend>
        <div class="dow" id="it-dow" aria-label="Days of week"></div>
        <div class="row">
          <label>From (optional) <input id="it-rec-start" type="date"></label>
          <label>Until (optional) <input id="it-rec-end" type="date"></label>
        </div>
      </fieldset>

      <label class="field">Notes (optional)
        <textarea id="it-notes" rows="2"></textarea>
      </label>

      <menu class="dialog-actions">
        <button type="button" id="it-delete" class="ghost danger">Delete</button>
        <span class="dialog-gap"></span>
        <button type="button" id="it-cancel" class="ghost">Cancel</button>
        <button type="submit" id="it-save" class="primary">Save</button>
      </menu>
    </form>
  </dialog>

  <!-- Page-scoped search palette (top-bar Search button / Ctrl+F). Opened non-modally. -->
  <dialog id="search-dialog" class="search-dialog">
    <div class="search-box">
      <input id="search-input" type="text" placeholder="Search…" autocomplete="off" spellcheck="false">
      <button type="button" id="search-close" class="ghost">Esc</button>
    </div>
    <div id="search-results" class="search-results"></div>
    <div class="search-foot">↑ ↓ to move · Enter to open · Esc to close</div>
  </dialog>

  <!-- Transient feedback (undo / redo) -->
  <div id="toast" class="toast" hidden></div>

  <!-- Load order: pure logic → store → actions → panels → bootstrap. -->
  <script src="js/util.js"></script>
  <script src="js/model.js"></script>
  <script src="js/store.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/journal.js"></script>
  <script src="js/picker.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
